services:
  unifi-protect:
    image: dciancu/unifi-protect-unvr-docker-arm64:stable
    tty: true
    hostname: UNVR
    extra_hosts:
      - "UNVR:127.0.1.1"
    container_name: unifi-protect
    stop_grace_period: 2m
    cgroup: host # for Linux, not required on macOS
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup # for Linux, not required on macOS
      # For Linux bind mounts work
      - ./storage/srv:/srv # Protect video
      - ./storage/data:/data
      - ./storage/persistent:/persistent
      # For macOS use volumes
#      - storage-srv:/srv
#      - storage-data:/data
#      - storage-persistent:/persistent
    environment:
      - container=docker
      - STORAGE_DISK=/dev/sda
      - DEBUG=false
      # Prefix (first three octets) of the LAN subnet that the macvlan
      # interface will live on. The in-container network_setup.sh uses
      # this to identify which attached interface is the LAN side and
      # renames it to enp0s2 (primary, owns default route, MAC source
      # for ubnt-tools). Any other attached interface becomes enp0s1.
      - LAN_SUBNET_PREFIX=10.10.76
    restart: unless-stopped
    cap_add: # for Linux, not required on macOS
      - dac_read_search
      - sys_admin
    security_opt: # for Linux, not required on macOS
      - apparmor=unconfined
      - seccomp=unconfined
    tmpfs:
      - /run
      - /run/lock
      - /tmp
      - /var/run
      - /var/run/lock
    privileged: true # required (also gives NET_ADMIN for the in-container interface rename)
    # Two networks:
    #   - unvr_lan: macvlan on the host NIC, giving the container a
    #     dedicated LAN IP. Listed first so docker makes it primary
    #     (default route goes via the LAN gateway). Becomes enp0s2
    #     inside the container after rename.
    #   - traefik-proxy: external bridge shared with Traefik for
    #     HTTP(S) reverse-proxy access. Becomes enp0s1 after rename.
    # No port mappings needed — LAN side is reachable directly via the
    # macvlan IP; public HTTP(S) goes through Traefik.
    networks:
      unvr_lan:
        ipv4_address: 10.10.76.9
      traefik-proxy: {}

networks:
  unvr_lan:
    driver: macvlan
    driver_opts:
      parent: enp0s1           # host physical NIC carrying the LAN
    ipam:
      config:
        - subnet: 10.10.76.0/24
          gateway: 10.10.76.1
  traefik-proxy:
    external: true

# For macOS use volumes
#volumes:
#  storage-srv:
#  storage-data:
#  storage-persistent:
